name: Create GitHub Repository

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Name of the repository to create"
        required: true
        type: string
      repo_description:
        description: "Repository description"
        required: false
        default: "Repository provisioned via Terraform."
        type: string
      visibility:
        description: "Repository visibility"
        required: false
        default: "private"
        type: string
      apply:
        description: "Run terraform apply?"
        required: false
        default: "true"
        type: string

# Prevent two runs from racing on the same state file.
concurrency:
  group: terraform-github-repo
  cancel-in-progress: false

permissions:
  contents: write

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_VAR_repo_name: ${{ github.event.inputs.repo }}
  TF_VAR_description: ${{ github.event.inputs.repo_description }}
  TF_VAR_visibility: ${{ github.event.inputs.visibility }}
  TF_VAR_github_owner: ${{ github.repository_owner }}

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: |
            .terraform
            .terraform.lock.hcl
          key: ${{ runner.os }}-terraform-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      - name: Export GitHub token
        run: echo "GITHUB_TOKEN=${{ secrets.GH_ADMIN_TOKEN }}" >> $GITHUB_ENV

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Show Terraform plan
        run: terraform show -no-color tfplan

      - name: Terraform Apply
        if: ${{ github.event.inputs.apply == 'true' }}
        run: terraform apply -auto-approve tfplan

      - name: Show outputs
        run: terraform output

        